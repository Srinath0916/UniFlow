<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Uniflow — Signed Out</title>
  {% load static %}
  <link href="{% static '/info/bootstrap/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background-color: #1a1d21;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      padding: 1rem;
      text-align: center;
    }

    .icon-ring {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(40, 167, 69, 0.12);
      border: 1px solid rgba(40, 167, 69, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.4rem;
      color: #28a745;
    }

    h2 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #f8f9fa;
      margin: 0 0 0.4rem;
    }

    p {
      font-size: 0.85rem;
      color: #6c757d;
      margin: 0 0 2rem;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #28a745;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 0.6rem 1.5rem;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-back:hover { background: #218838; color: #fff; text-decoration: none; }
    .btn-back:active { transform: scale(0.98); }

    .footer-note {
      margin-top: 2rem;
      font-size: 0.72rem;
      color: #343a40;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon-ring">
      <i class="fas fa-sign-out-alt"></i>
    </div>
    <h2>You've been signed out</h2>
    <p>Your session has ended. Sign back in whenever you're ready.</p>
    <a href="/accounts/login/" class="btn-back">
      <i class="fas fa-arrow-left"></i> Back to Sign In
    </a>
    <div class="footer-note">Uniflow &copy; {% now "Y" %}</div>
  </div>
</body>
</html>
